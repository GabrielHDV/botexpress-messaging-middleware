services:
  redis:
    image: redis:7-alpine
    container_name: botexpress-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: botexpress-messaging-middleware
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis
